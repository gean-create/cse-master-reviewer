name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Flet
        run: pip install flet==0.85.3

      - name: Build APK
        run: yes | flet build apk --no-rich-output

      - name: Find APK location
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cse-master-reviewer-apk
          path: |
            build/apk/*.apk
            build/**/*.apk
          if-no-files-found: warn
          retention-days: 30
